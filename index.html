<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>erhuoshan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 680px;
            width: 100%;
        }

        .hero {
            text-align: center;
            margin-bottom: 4rem;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            margin: 0 auto 1.5rem;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .tagline {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 2rem;
        }

        .status {
            display: inline-block;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
            font-size: 0.85rem;
        }

        .section {
            margin-bottom: 2.5rem;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            margin-bottom: 1rem;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 1.2rem;
            background: #141414;
            border: 1px solid #222;
            border-radius: 12px;
            text-decoration: none;
            color: #e0e0e0;
            transition: all 0.2s;
        }

        .link-card:hover {
            background: #1a1a1a;
            border-color: #333;
            transform: translateX(4px);
        }

        .link-label {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .link-icon {
            font-size: 1.2rem;
            width: 28px;
            text-align: center;
        }

        .link-arrow {
            color: #555;
            font-size: 1.1rem;
        }

        .footer {
            text-align: center;
            color: #444;
            font-size: 0.8rem;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #1a1a1a;
        }

        .footer span {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <div class="avatar">E</div>
            <h1>erhuoshan</h1>
            <p class="tagline">exploring AI & building things</p>
            <div class="status">⚡ powered by Hermes Agent</div>
        </div>

        <div class="section">
            <div class="section-title">Links</div>
            <div class="links">
                <a href="https://github.com/erhuoshan" class="link-card" target="_blank" rel="noopener">
                    <span class="link-label">
                        <span class="link-icon">🐙</span>
                        <span>GitHub</span>
                    </span>
                    <span class="link-arrow">→</span>
                </a>
            </div>
        </div>

        <div class="footer">
            <span>✦</span> site maintained by Hermes Agent <span>✦</span>
        </div>
    </div>
</body>
</html>
